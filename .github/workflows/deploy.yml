name: Deploy to Server

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy code to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "."
          target: "/srv/apps/reverse-proxy/apps/find-movie-location"

      - name: Build and Restart on Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /srv/apps/reverse-proxy/apps/find-movie-location
            # On build l'image directement sur le serveur
            docker compose up -d --build
            # On nettoie les vieux caches et on migre
            docker exec find-movie-location php artisan migrate --force
            docker exec find-movie-location php artisan config:cache
            docker exec find-movie-location php artisan route:cache
            docker exec find-movie-location php artisan view:cache
