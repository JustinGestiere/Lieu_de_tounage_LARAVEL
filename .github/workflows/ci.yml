# ═══════════════════════════════════════════════════════════
# CI/CD Pipeline - Laravel Films & Locations
# ═══════════════════════════════════════════════════════════
# Déclenché à chaque push ou pull request sur main/master.
# 1. Installe PHP + Composer + Node
# 2. Lance les tests Pest (SQLite in-memory)
# 3. Vérifie le formatage avec Laravel Pint
# 4. Build l'image Docker (sans la pousser)
# ═══════════════════════════════════════════════════════════

name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ── JOB 1 : Tests ──
  tests:
    name: Tests (PHP 8.3 + SQLite)
    runs-on: ubuntu-latest

    steps:
      # Récupère le code source
      - name: Checkout code
        uses: actions/checkout@v4

      # Installe PHP 8.3 avec les extensions nécessaires
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo_sqlite, sqlite3, bcmath, zip
          coverage: none

      # Cache des dépendances Composer pour accélérer les builds
      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      # Installe les dépendances PHP
      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      # Prépare le fichier .env pour les tests
      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate

      # Installe Node.js et build les assets
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install NPM dependencies
        run: npm ci

      - name: Build assets
        run: npm run build

      # Lance les tests Pest avec SQLite in-memory
      # (configuré dans phpunit.xml)
      - name: Run tests
        run: php artisan test --parallel
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: ":memory:"

  # ── JOB 2 : Qualité de code (Pint) ──
  lint:
    name: Laravel Pint (Code Style)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      # Vérifie le formatage sans modifier les fichiers (--test)
      - name: Run Pint
        run: ./vendor/bin/pint --test

  # ── JOB 3 : Build Docker (validation) ──
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [tests, lint]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Build l'image Docker pour vérifier qu'elle compile
      # On ne la pousse pas (pas de docker push)
      - name: Build Docker image
        run: docker build -t laravel-app:ci .
